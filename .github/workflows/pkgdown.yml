name: pkgdown

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pkgdown
            any::yaml
          needs: website

      - name: Check extension assets are in sync
        run: |
          Rscript data-raw/sync_assets.R
          if [ -n "$(git status --porcelain -- _extensions)" ]; then
            echo "::error::_extensions is out of sync with inst/quarto — run data-raw/sync_assets.R and commit"
            git status --porcelain -- _extensions
            exit 1
          fi

      - name: Render live example report
        run: Rscript data-raw/render_example.R

      - name: Build pkgdown site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = TRUE)
        shell: Rscript {0}

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs
          clean: true
